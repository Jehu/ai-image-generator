# Desktop-Builds für macOS, Windows und Linux.
# Code-Signing ist bewusst NICHT konfiguriert (Entscheidung 2026-06-11).
# Update-Artefakte (latest.json + Signaturen) werden nur erzeugt, wenn das
# Secret TAURI_SIGNING_PRIVATE_KEY gesetzt ist (Updater-Keypair, kein OS-Signing).
name: Desktop Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Draft-Release VOR den Builds anlegen: tauri-action darf mit GITHUB_TOKEN
  # kein Release für einen Commit erstellen, der nicht HEAD des Default-Branch
  # ist (403 "Resource not accessible by integration" bei getaggten älteren
  # Commits). Existiert der Draft bereits, lädt tauri-action nur noch hoch.
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            --jq ".[] | select(.tag_name==\"${GITHUB_REF_NAME}\") | .id" | head -1)
          if [ -z "$EXISTING" ]; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --draft --title "Image Style Studio ${GITHUB_REF_NAME}" --notes ""
            echo "Draft-Release ${GITHUB_REF_NAME} angelegt"
          else
            echo "Release ${GITHUB_REF_NAME} existiert bereits (ID ${EXISTING})"
          fi

  build:
    needs: create-release
    # workflow_dispatch (kein Tag) überspringt create-release — Builds laufen trotzdem.
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Image Style Studio ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  # Hält packaging/aur/ synchron zum Release: lädt das frische .deb aus dem
  # (noch unveröffentlichten) Release-Draft, berechnet die SHA256 und bumpt
  # PKGBUILD + .SRCINFO auf main. Kein AUR-Push — nur Repo-Pflege.
  update-aur-pkgbuild:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - name: Bump PKGBUILD and .SRCINFO
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DEB_NAME="Image.Style.Studio_${VERSION}_amd64.deb"

          # Release-Draft per API finden (Tag-Download geht bei Drafts nicht)
          ASSET_ID=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            --jq ".[] | select(.tag_name==\"${GITHUB_REF_NAME}\") | .assets[] | select(.name==\"${DEB_NAME}\") | .id" | head -1)
          if [ -z "$ASSET_ID" ]; then
            echo "::error::Asset ${DEB_NAME} im Release ${GITHUB_REF_NAME} nicht gefunden"
            exit 1
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" \
            -H "Accept: application/octet-stream" > pkg.deb
          SHA256=$(sha256sum pkg.deb | cut -d' ' -f1)
          echo "Version ${VERSION}, SHA256 ${SHA256}"

          sed -i \
            -e "s|^pkgver=.*|pkgver=${VERSION}|" \
            -e "s|^pkgrel=.*|pkgrel=1|" \
            -e "s|^sha256sums_x86_64=.*|sha256sums_x86_64=('${SHA256}')|" \
            packaging/aur/PKGBUILD
          sed -i \
            -e "s|pkgver = .*|pkgver = ${VERSION}|" \
            -e "s|pkgrel = .*|pkgrel = 1|" \
            -e "s|source_x86_64 = .*|source_x86_64 = image-style-studio-bin-${VERSION}.deb::https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Image.Style.Studio_${VERSION}_amd64.deb|" \
            -e "s|sha256sums_x86_64 = .*|sha256sums_x86_64 = ${SHA256}|" \
            packaging/aur/.SRCINFO
          rm pkg.deb

          if git diff --quiet packaging/aur/; then
            echo "PKGBUILD bereits aktuell — nichts zu tun"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/
          git commit -m "Update AUR PKGBUILD to ${VERSION}"
          git push origin main
